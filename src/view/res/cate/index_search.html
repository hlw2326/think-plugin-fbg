<form class="layui-form layui-form-pane form-search" action="{:request()->url()}" onsubmit="return false" method="get" autocomplete="off">
    <fieldset>
        <legend>{:lang('条件搜索')}</legend>

        <div class="layui-form-item layui-inline">
            <label class="layui-form-label">分类名称</label>
            <div class="layui-input-inline">
                <input name="name" value="{$get.name|default=''}" placeholder="请输入分类名称" class="layui-input">
            </div>
        </div>

        <div class="layui-form-item layui-inline">
            <label class="layui-form-label">分类编码</label>
            <div class="layui-input-inline">
                <input name="code" value="{$get.code|default=''}" placeholder="请输入分类编码" class="layui-input">
            </div>
        </div>

        <div class="layui-form-item layui-inline">
            <label class="layui-form-label">状态</label>
            <div class="layui-input-inline">
                <select class="layui-select" name="status" lay-append-to>
                    <option value="">-- 全部 --</option>
                    <option value="1" {eq name='$get.status|default=""' value='1'}selected{/eq}>已启用</option>
                    <option value="0" {eq name='$get.status|default=""' value='0'}selected{/eq}>已禁用</option>
                </select>
            </div>
        </div>

        <div class="layui-form-item layui-inline">
            <button class="layui-btn layui-btn-primary" data-form-search type="submit"><i class="layui-icon">&#xe615;</i> 搜索</button>
        </div>
    </fieldset>
</form>
