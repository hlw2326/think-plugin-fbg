<form class="layui-form layui-form-pane form-search" action="{:request()->url()}" onsubmit="return false" method="get" autocomplete="off">
    <fieldset>
        <legend>{:lang('条件搜索')}</legend>

        <div class="layui-form-item layui-inline">
            <label class="layui-form-label">资源标题</label>
            <div class="layui-input-inline">
                <input name="title" value="{$get.title|default=''}" placeholder="请输入资源标题" class="layui-input">
            </div>
        </div>

        <div class="layui-form-item layui-inline">
            <label class="layui-form-label">所属分类</label>
            <div class="layui-input-inline">
                <select class="layui-select" name="cate_id" lay-append-to>
                    <option value="">-- 全部 --</option>
                    {foreach $cates as $cate}
                    <option value="{$cate.id}" {eq name='$get.cate_id|default=""' value='$cate.id'}selected{/eq}>{$cate.name}</option>
                    {/foreach}
                </select>
            </div>
        </div>

        <div class="layui-form-item layui-inline">
            <label class="layui-form-label">资源类型</label>
            <div class="layui-input-inline">
                <select class="layui-select" name="ext" lay-append-to>
                    <option value="">-- 全部 --</option>
                    <option value="image" {eq name='$get.ext|default=""' value='image'}selected{/eq}>图片</option>
                    <option value="video" {eq name='$get.ext|default=""' value='video'}selected{/eq}>视频</option>
                </select>
            </div>
        </div>

        <div class="layui-form-item layui-inline">
            <label class="layui-form-label">状态</label>
            <div class="layui-input-inline">
                <select class="layui-select" name="status" lay-append-to>
                    <option value="">-- 全部 --</option>
                    <option value="1" {eq name='$get.status|default=""' value='1'}selected{/eq}>已启用</option>
                    <option value="0" {eq name='$get.status|default=""' value='0'}selected{/eq}>已禁用</option>
                </select>
            </div>
        </div>

        <div class="layui-form-item layui-inline">
            <button class="layui-btn layui-btn-primary" data-form-search type="submit"><i class="layui-icon">&#xe615;</i> 搜索</button>
        </div>
    </fieldset>
</form>
