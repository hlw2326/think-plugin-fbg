<form action="{:sysuri('import')}?appid={$appid|default=''}" method="post" data-auto="true" class="layui-form layui-card" data-table-id="RuleTable">
    <div class="layui-card-body padding-left-40 padding-right-40">
        <label class="layui-form-item relative block">
            <span class="color-green font-w7">选择JSON文件</span>
            <div class="relative">
                <input id="json_file_name" readonly class="layui-input padding-right-30" placeholder="请选择导出的 .json 数据文件" style="cursor: pointer;">
                <a class="input-right-icon" onclick="$('#json_file').click()"><i class="layui-icon layui-icon-upload"></i></a>
                <input type="file" id="json_file" accept=".json" style="display: none;">
            </div>
            <span class="help-block">选择导出的 <code>.json</code> 数据文件，系统会自动读取内容填入下方输入框。</span>
        </label>

        <label class="layui-form-item relative block">
            <span class="color-green font-w7">JSON 数据内容</span>
            <textarea name="json_data" required vali-name="JSON数据" placeholder='例如：
[
    {
        "match_type": "exact",
        "keyword": "你好",
        "reply_type": "text",
        "content": "你也好呀！",
        "sort": 0,
        "status": 1
    }
]' class="layui-textarea" style="height: 250px; font-family: monospace; font-size: 13px; line-height: 1.5;"></textarea>
            <span class="help-block">可以手动修改或直接粘贴 JSON 数据，支持单条对象或数组</span>
        </label>

    </div>
    <div class="hr-line-dashed"></div>
    <div class="layui-form-item text-center">
        <button class="layui-btn" type="submit">开始导入</button>
        <button class="layui-btn layui-btn-danger" type="button" data-close>取消操作</button>
    </div>
</form>

<script>
    $(function() {
        $('#json_file_name').on('click', function() {
            $('#json_file').click();
        });

        $('#json_file').on('change', function (e) {
            var file = e.target.files[0];
            if (file) {
                $('#json_file_name').val(file.name);
                var reader = new FileReader();
                reader.onload = function (evt) {
                    $('textarea[name="json_data"]').val(evt.target.result);
                };
                reader.readAsText(file);
            }
            this.value = '';
        });
    });
</script>
